<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بازخوردها</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

:root{
    --main-color:#E66C00;
}

body{
    background:#f8f9fa;
}

.page-title{
    color:var(--main-color);
    font-weight:700;
}

.header-box{
    background:white;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.main-card{
    border:none;
    border-radius:18px;
    overflow:hidden;
}

.feedback-link{
    text-decoration:none;
    color:#212529;
    display:block;
    font-weight:500;
}

.feedback-link:hover{
    color:var(--main-color);
}

.list-group-item{
    transition:.2s;
    padding:18px;
}

.list-group-item:hover{
    background:#fff7ef;
}

.back-btn{
    background:var(--main-color);
    border:none;
}

.back-btn:hover{
    background:#c65c00;
}

</style>

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="header-box d-flex justify-content-between align-items-center">

        <div>

            <h2 class="page-title mb-1">

                بازخوردهای کاربر

            </h2>

            <small class="text-muted">

                {{ email }}

            </small>

        </div>

        <a
            href="/admin/feedbacks"
            class="btn back-btn text-white">

            بازگشت

        </a>

    </div>

    <div class="card shadow-sm main-card">

        <div class="card-body p-0">

            <ul class="list-group list-group-flush">

                {% for feedback in feedbacks %}

                <li class="list-group-item">

                    <a
                        href="/admin/feedback/{{ feedback.id }}"
                        class="feedback-link">

                        {{ feedback.title }}

                    </a>

                </li>

                {% endfor %}

            </ul>

        </div>

    </div>

</div>

</body>

</html>
