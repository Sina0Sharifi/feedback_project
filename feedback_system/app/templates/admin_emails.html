<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ایمیل ها</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

:root{
    --main-color:#E66C00;
}

body{
    background:#f8f9fa;
}

.page-title{
    color:var(--main-color);
    font-weight:700;
}

.main-card{
    border:none;
    border-radius:18px;
    overflow:hidden;
}

.table thead{
    background:#fff7ef;
}

.table thead th{
    color:var(--main-color);
    font-weight:700;
    border-bottom:none;
}

.table tbody tr{
    transition:0.2s;
}

.table tbody tr:hover{
    background:#fff7ef;
}

.email-link{
    text-decoration:none;
    color:#212529;
    font-weight:500;
}

.email-link:hover{
    color:var(--main-color);
}

.count-badge{
    background:#fff3e8;
    color:var(--main-color);
    font-size:14px;
    padding:8px 14px;
    border-radius:20px;
    font-weight:600;
}

.logout-btn{
    background:var(--main-color);
    border:none;
}

.logout-btn:hover{
    background:#c65c00;
}

.header-box{
    background:white;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="header-box d-flex justify-content-between align-items-center">

        <div>

            <h2 class="page-title mb-1">
                مدیریت بازخوردها
            </h2>

            <small class="text-muted">
                کاربران ثبت کننده بازخورد
            </small>

        </div>

        <a
            href="/admin/logout"
            class="btn logout-btn text-white">

            خروج از پنل

        </a>

    </div>

    <div class="card shadow-sm main-card">

        <div class="card-body p-4">

            <table class="table align-middle mb-0">

                <thead>

                    <tr>

                        <th>
                            ایمیل
                        </th>

                        <th class="text-center">
                            تعداد بازخورد
                        </th>

                    </tr>

                </thead>

                <tbody>

                    {% for item in emails %}

                    <tr>

                        <td>

                            <a
                                href="/admin/feedbacks/{{ item.email }}"
                                class="email-link">

                                {{ item.email }}

                            </a>

                        </td>

                        <td class="text-center">

                            <span class="count-badge">

                                {{ item.count }}

                            </span>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
