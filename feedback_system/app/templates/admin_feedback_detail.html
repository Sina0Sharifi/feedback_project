<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">

    <title>جزئیات بازخورد</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow">

        <div class="card-body">

            <h3 class="mb-4">

                جزئیات بازخورد

            </h3>

            {% if success %}

            <div class="alert alert-success">

                اطلاعات ذخیره شد

            </div>

            {% endif %}

            <p>

                <strong>ایمیل:</strong>

                {{ feedback.email }}

            </p>

            <p>

                <strong>عنوان:</strong>

                {{ feedback.title }}

            </p>

            <p>

                <strong>متن:</strong>

                {{ feedback.body }}

            </p>

            <hr>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">

                        وضعیت

                    </label>

                    <select
                        name="status"
                        class="form-select">

                        <option
                            {% if feedback.status == "دریافتی" %}selected{% endif %}>
                            دریافتی
                        </option>

                        <option
                            {% if feedback.status == "در حال بررسی" %}selected{% endif %}>
                            در حال بررسی
                        </option>

                        <option
                            {% if feedback.status == "پاسخ داده شده" %}selected{% endif %}>
                            پاسخ داده شده
                        </option>

                        <option
                            {% if feedback.status == "بسته شده" %}selected{% endif %}>
                            بسته شده
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        پاسخ

                    </label>

                    <textarea
                        name="reply"
                        rows="6"
                        class="form-control">{{ feedback.reply or "" }}</textarea>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    ذخیره

                </button>

                <a
                    href="/admin/feedbacks"
                    class="btn btn-secondary">

                    بازگشت

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
