<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>جزئیات بازخورد</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

:root{
    --main-color:#E66C00;
}

body{
    background:#f8f9fa;
}

.page-title{
    color:var(--main-color);
    font-weight:700;
}

.header-box{
    background:white;
    padding:20px;
    border-radius:18px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.main-card{
    border:none;
    border-radius:18px;
    overflow:hidden;
}

.preserve-text{
    white-space: pre-wrap;
    word-break: break-word;
    line-height:1.8;
}

.feedback-body{
    background:#fff7ef;
    border:1px solid #ffd4ad;
    border-radius:12px;
    padding:15px;
}

.save-btn{
    background:var(--main-color);
    border:none;
}

.save-btn:hover{
    background:#c65c00;
}

.form-select:focus,
.form-control:focus{
    border-color:var(--main-color);
    box-shadow:0 0 0 .15rem rgba(230,108,0,.2);
}

.info-label{
    color:#6c757d;
    font-weight:600;
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="header-box d-flex justify-content-between align-items-center">

        <div>

            <h2 class="page-title mb-1">
                جزئیات بازخورد
            </h2>

            <small class="text-muted">
                مدیریت و پاسخگویی
            </small>

        </div>

        <a
            href="/admin/feedbacks/{{ feedback.email }}"
            class="btn btn-outline-secondary">

            بازگشت

        </a>

    </div>

    <div class="card shadow-sm main-card">

        <div class="card-body p-4">

            {% if success %}

            <div class="alert alert-success">

                اطلاعات با موفقیت ذخیره شد.

            </div>

            {% endif %}

            <div class="mb-3">

                <div class="info-label mb-1">
                    ایمیل
                </div>

                <div>
                    {{ feedback.email }}
                </div>

            </div>

            <div class="mb-4">

                <div class="info-label mb-1">
                    عنوان
                </div>

                <div>
                    {{ feedback.title }}
                </div>

            </div>

            <div class="mb-4">

                <div class="info-label mb-2">
                    متن بازخورد
                </div>

                <div class="feedback-body preserve-text">
                    {{ feedback.body }}
                </div>

            </div>

            <hr>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">

                        وضعیت

                    </label>

                    <select
                        name="status"
                        class="form-select">

                        <option {% if feedback.status == "دریافتی" %}selected{% endif %}>
                            دریافتی
                        </option>

                        <option {% if feedback.status == "در حال بررسی" %}selected{% endif %}>
                            در حال بررسی
                        </option>

                        <option {% if feedback.status == "پاسخ داده شده" %}selected{% endif %}>
                            پاسخ داده شده
                        </option>

                        <option {% if feedback.status == "بسته شده" %}selected{% endif %}>
                            بسته شده
                        </option>

                    </select>

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        پاسخ

                    </label>

                    <textarea
                        name="reply"
                        rows="10"
                        class="form-control">{{ feedback.reply or "" }}</textarea>

                </div>

                <button
                    type="submit"
                    class="btn save-btn text-white">

                    ذخیره تغییرات

                </button>

                <a
                    href="/admin/feedbacks/{{ feedback.email }}"
                    class="btn btn-outline-secondary">

                    بازگشت

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
