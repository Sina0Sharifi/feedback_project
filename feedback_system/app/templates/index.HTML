<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        :root{
            --main-color:#E66C00;
        }

        body{
            background-color:#f8f9fa;
        }

        .main-title{
            color:var(--main-color);
            font-weight:bold;
        }

        .custom-card{
            border:2px solid var(--main-color);
            border-radius:15px;
        }

        .btn-orange{
            background-color:var(--main-color);
            color:white;
        }

        .btn-orange:hover{
            background-color:#c65c00;
            color:white;
        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="main-title">سیستم مدیریت بازخورد</h1>
        <p class="text-muted">
            ثبت بازخورد و مشاهده پاسخ‌های دریافتی
        </p>
    </div>
{% if success %}

<div class="alert alert-success">

    بازخورد با موفقیت ثبت شد.

</div>

{% endif %}
    <div class="row g-4">

        <!-- ارسال بازخورد -->

        <div class="col-lg-6">

            <div class="card custom-card shadow-sm">

                <div class="card-body">

                    <h3 class="mb-4">
                        ارسال بازخورد
                    </h3>

                    <form method="POST"
                          action="/feedback/create">

                        <div class="mb-3">

                            <label class="form-label">
                                ایمیل
                            </label>

                            <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    required
                                    placeholder="example@gmail.com">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                عنوان
                            </label>

                            <input
                                    type="text"
                                    name="title"
                                    class="form-control"
                                    required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                متن بازخورد
                            </label>

                            <textarea
                                    name="body"
                                    rows="6"
                                    class="form-control"
                                    required>
                            </textarea>

                        </div>

                        <button
                                type="submit"
                                class="btn btn-orange w-100">

                            ارسال بازخورد

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- مشاهده بازخوردها -->

        <div class="col-lg-6">

            <div class="card custom-card shadow-sm">

                <div class="card-body">

                    <h3 class="mb-4">
                        مشاهده بازخوردها
                    </h3>

                    <form>

                        <div class="mb-3">

                            <label class="form-label">
                                ایمیل خود را وارد کنید
                            </label>

                            <input
                                    type="email"
                                    class="form-control"
                                    required
                                    placeholder="example@gmail.com">

                        </div>

                        <button
                                type="submit"
                                class="btn btn-orange w-100">

                            مشاهده بازخوردها

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
