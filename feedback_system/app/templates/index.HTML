<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        :root{
            --main-color:#E66C00;
        }

        body{
            background-color:#f8f9fa;
        }

        .main-title{
            color:var(--main-color);
            font-weight:bold;
        }

        .custom-card{
            border:2px solid var(--main-color);
            border-radius:15px;
        }

        .btn-orange{
            background-color:var(--main-color);
            color:white;
        }

        .btn-orange:hover{
            background-color:#c65c00;
            color:white;
        }

    </style>

</head>

<body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div class="container py-5">

    <div class="text-center mb-5">
        <h1 class="main-title">سیستم مدیریت بازخورد</h1>
        <p class="text-muted">
            ثبت بازخورد و مشاهده پاسخ‌های دریافتی
        </p>
    </div>
{% if success %}

<div class="alert alert-success">

    بازخورد با موفقیت ثبت شد.

</div>

{% endif %}
    <div class="row g-4">

        <!-- ارسال بازخورد -->

        <div class="col-lg-6">

            <div class="card custom-card shadow-sm">

                <div class="card-body">

                    <h3 class="mb-4">
                        ارسال بازخورد
                    </h3>

                    <form id="feedbackForm"
                         method="POST"
                            action="/feedback/create">

                        <div class="mb-3">

                            <label class="form-label">
                                ایمیل
                            </label>

                            <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    required
                                    placeholder="example@gmail.com">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                عنوان
                            </label>

                            <input
                                    type="text"
                                    name="title"
                                    class="form-control"
                                    required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                متن بازخورد
                            </label>

                            <textarea
                                    name="body"
                                    rows="6"
                                    class="form-control"
                                    required>
                            </textarea>

                        </div>

                        <button
                                type="submit"
                                class="btn btn-orange w-100">

                            ارسال بازخورد

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- مشاهده بازخوردها -->

        <div class="col-lg-6">

            <div class="card custom-card shadow-sm">

                <div class="card-body">

                    <h3 class="mb-4">
                        مشاهده بازخوردها
                    </h3>

                    <form id="searchForm">

                        <div class="mb-3">

                            <label class="form-label">
                                ایمیل خود را وارد کنید
                            </label>

                                <input
                                    type="email"
                                    id="searchEmail"
                                    class="form-control"
                                    required
                                    placeholder="example@gmail.com">

                        </div>

                        <button
                                type="submit"
                                class="btn btn-orange w-100">

                            مشاهده بازخوردها

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>


<div class="modal fade"
     id="verificationModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    تایید کد
                </h5>

            </div>

            <div class="modal-body">

                <div
                    id="generatedCode"
                    class="alert alert-warning text-center">

                    کد اینجا نمایش داده می‌شود

                </div>

                <input
                    type="text"
                    id="verificationInput"
                    class="form-control"
                    placeholder="کد 4 رقمی را وارد کنید">

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    id="verifyButton"
                    class="btn btn-orange">

                    تایید

                </button>

            </div>

        </div>

    </div>

</div>
<script>
const feedbackForm = document.getElementById("feedbackForm");
const searchForm = document.getElementById("searchForm");
const searchEmail = document.getElementById("searchEmail");
const modalEl = document.getElementById("verificationModal");
const modal = bootstrap.Modal.getOrCreateInstance(modalEl);

let currentAction = "";

async function openVerificationModal() {
    const response = await fetch("/generate-code");
    const data = await response.json();

    document.getElementById("generatedCode").innerText =
        "کد تایید شما: " + data.generated_code;

    modal.show();
}

feedbackForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    currentAction = "create";
    await openVerificationModal();
});

searchForm.addEventListener("submit", async function (event) {
    event.preventDefault();
    currentAction = "search";
    await openVerificationModal();
});

document.getElementById("verifyButton").addEventListener("click", async function () {
    const code = document.getElementById("verificationInput").value.trim();

    const formData = new FormData();
    formData.append("code", code);

    const response = await fetch("/verify-code", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    if (!data.success) {
        alert("کد وارد شده اشتباه است");
        return;
    }

    modal.hide();

    if (currentAction === "create") {
        HTMLFormElement.prototype.submit.call(feedbackForm);
    } else if (currentAction === "search") {
        const email = searchEmail.value.trim();
        window.location.href = `/feedbacks/${encodeURIComponent(email)}`;
    }
});
</script>
</body>

</html>
