<!DOCTYPE html>

<html lang="fa" dir="rtl">

<head>


<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
    ورود ادمین
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

    :root{
        --main-color:#E66C00;
    }

    body{
        background:#f7f8fa;
        min-height:100vh;
        display:flex;
        align-items:center;
    }

    .login-card{

        border:none;
        border-radius:20px;
        overflow:hidden;
        box-shadow:
        0 10px 30px rgba(0,0,0,.08);
    }

    .card-body{
        padding:40px;
    }

    .title{

        color:var(--main-color);
        font-weight:700;
        margin-bottom:10px;
    }

    .subtitle{

        color:#6c757d;
        font-size:14px;
        margin-bottom:30px;
    }

    .form-control{

        height:52px;
        border-radius:12px;
        border:1px solid #dee2e6;
    }

    .form-control:focus{

        border-color:var(--main-color);

        box-shadow:
        0 0 0 .2rem rgba(230,108,0,.15);
    }

    .btn-orange{

        background:var(--main-color);
        color:white;
        border:none;

        height:52px;
        border-radius:12px;

        font-weight:600;
    }

    .btn-orange:hover{

        background:#cc5f00;
        color:white;
    }

    .logo-circle{

        width:70px;
        height:70px;

        background:
        rgba(230,108,0,.1);

        border-radius:50%;

        display:flex;
        align-items:center;
        justify-content:center;

        margin:0 auto 20px;

        color:var(--main-color);

        font-size:28px;
        font-weight:bold;
    }

</style>


</head>

<body>

<div class="container">

<div class="row justify-content-center">

    <div class="col-lg-4 col-md-6">

        <div class="card login-card">

            <div class="card-body">

                <div class="text-center">

                    <div class="logo-circle">
                        A
                    </div>

                    <h3 class="title">
                        پنل مدیریت
                    </h3>

                    <p class="subtitle">
                        برای ورود اطلاعات خود را وارد کنید
                    </p>

                </div>

                {% if error %}

                <div class="alert alert-danger">

                    نام کاربری یا رمز عبور اشتباه است

                </div>

                {% endif %}

                <form
                    method="POST"
                    action="/admin/login">

                    <div class="mb-3">

                        <label class="form-label">

                            نام کاربری

                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            رمز عبور

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-orange w-100">

                        ورود به پنل مدیریت

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

</body>

</html>
